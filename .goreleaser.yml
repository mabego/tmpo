version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c 'go run main.go completion bash > completions/tmpo.bash'
    - sh -c 'go run main.go completion zsh > completions/tmpo.zsh'
    - sh -c 'go run main.go completion fish > completions/tmpo.fish'

builds:
  # macOS (both Intel and Apple Silicon)
  - id: macos
    goos: [darwin]
    goarch: [amd64, arm64]
    binary: tmpo
    ldflags:
      - -s -w
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Version={{.Version}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Commit={{.Commit}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Date={{.Date}}

  # Linux
  - id: linux
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    binary: tmpo
    ldflags:
      - -s -w
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Version={{.Version}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Commit={{.Commit}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Date={{.Date}}

  # Windows
  - id: windows
    goos: [windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    binary: tmpo
    ldflags:
      - -s -w
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Version={{.Version}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Commit={{.Commit}}
      - -X github.com/DylanDevelops/tmpo/cmd/utilities.Date={{.Date}}

archives:
  - id: windows-zip
    ids: [windows]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [zip]
    files:
      - README.md
      - LICENSE
      - completions/tmpo.bash
      - completions/tmpo.zsh
      - completions/tmpo.fish

  - id: unix-targz
    ids: [macos, linux]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - completions/tmpo.bash
      - completions/tmpo.zsh
      - completions/tmpo.fish

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: DylanDevelops
    name: tmpo
  draft: false
  prerelease: auto
  name_template: "tmpo {{.Version}}"

# Homebrew
brews:
  - name: tmpo
    repository:
      owner: DylanDevelops
      name: homebrew-tmpo
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/DylanDevelops/tmpo"
    description: "Minimal CLI time tracker for developers"
    license: "MIT"
    extra_install: |
      bash_completion.install "completions/tmpo.bash" => "tmpo"
      zsh_completion.install "completions/tmpo.zsh" => "_tmpo"
      fish_completion.install "completions/tmpo.fish"
